services:
  - name: hindsight-cognee-service
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./cognee-service/Dockerfile
    dockerContext: .
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-5.4-mini
      - key: LLM_API_KEY
        sync: false
      # fastembed loads a local ONNX model into process memory -- fine
      # locally, but it's what pushed the free Render instance (512MB) over
      # the edge under real request load (502s that only appeared once
      # cognify actually ran, not on /health). Routing embeddings through
      # OpenAI's API instead removes that in-process model entirely.
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: GRAPH_DATABASE_PROVIDER
        value: ladybug
      - key: VECTOR_DB_PROVIDER
        value: lancedb
      - key: DB_PROVIDER
        value: sqlite
      - key: ENABLE_BACKEND_ACCESS_CONTROL
        value: "true"
      - key: ONTO_API_URL
        value: https://api.buildonto.dev
      - key: ONTO_API_KEY
        sync: false
